name: Score

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch: {}

concurrency:
  group: score

permissions:
  contents: write

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build pipeline dependencies
        run: pnpm exec turbo run build --filter=@agora/platform...

      - name: Run scoring pipeline
        run: pnpm --filter @agora/platform run score
        env:
          AGORA_PIPELINE_OUTPUT_DIR: ../web/data
          AGORA_PIPELINE_BUDGET_MIN: "50"
          AGORA_PIPELINE_PRIORITY: "argentina,latam,all"
          AGORA_PIPELINE_DETAIL_PRESETS: "argentina,latam"
          AGORA_PIPELINE_RESCORE_DAYS: "7"
          AGORA_PIPELINE_CHUNK_SIZE: "1000"
          AGORA_PIPELINE_CATALOG_TIMEOUT_MIN: "15"
          AGORA_PIPELINE_CKAN_PAGE_SIZE: "1000"
          AGORA_PIPELINE_ACCESSIBILITY_SAMPLE_SIZE: "50"
          AGORA_PIPELINE_HEAD_TIMEOUT_MS: "5000"

      - name: Validate pipeline output
        run: |
          echo "Validating pipeline JSON output..."
          for f in packages/web/data/meta.json packages/web/data/catalogs.json; do
            if [ -f "$f" ]; then
              jq empty "$f" || { echo "Invalid JSON: $f"; exit 1; }
              echo "  ✓ $f"
            else
              echo "Missing expected file: $f"; exit 1
            fi
          done
          for f in packages/web/data/catalogs/*/scores.json; do
            if [ -f "$f" ]; then
              jq empty "$f" || { echo "Invalid JSON: $f"; exit 1; }
              echo "  ✓ $f"
            fi
          done
          echo "All JSON files valid."

      - name: Pipeline summary
        if: always()
        run: |
          if [ -f packages/web/data/meta.json ]; then
            jq . packages/web/data/meta.json
          fi

      - name: Commit updated scores
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/web/data/
          git diff --cached --quiet || git commit -m "data: update quality scores $(date -u +%Y-%m-%d)"
          git push
